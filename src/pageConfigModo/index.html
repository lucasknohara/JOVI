<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar Novo Modo - Câmera</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="aplicativo-camera">

  <div class="top-bar-ajustada">
    <span class="btn-fechar">&#10005;</span>
    <h2>Configurar Novo Modo</h2>
    <button class="btn-salvar">Salvar</button>
  </div>

  <div class="conteudo">
    <div class="cartao">
      <label class="campo-label">Nome do modo</label>
      <input class="campo-input" type="text" placeholder="Rapidez para estudo">
    </div>

    <div class="cartao">
      <p class="campo-label">Icons</p>
      <div class="icones-wrapper">
        <span class="seta-nav">&#8592;</span>
        <div class="icones-lista">
          <div class="icone-item"><div class="icone-circulo">📸</div></div>
          <div class="icone-item"><div class="icone-circulo">⚡</div></div>
          <div class="icone-item"><div class="icone-circulo">🔍</div></div>
          <div class="icone-item"><div class="icone-circulo">👤</div></div>
          <div class="icone-item ativo"><div class="icone-circulo">📖</div></div>
        </div>
        <span class="seta-nav">&#8594;</span>
      </div>
    </div>

    <div class="cartao">
      <p class="secao-titulo">Ajustes Visuais</p>
      <div class="slider-grupo">
        <label class="slider-label">Zoom</label>
        <input type="range" class="slider slider-branco" min="0" max="100" value="30">
        <div class="slider-marcas">
          <span>0.5x</span><span>2x</span><span>10x</span>
        </div>
      </div>

      <div class="filtros-grade">
        <div class="filtro-item filtro-natural"><span>Natural</span></div>
        <div class="filtro-item filtro-alto-contraste ativo"><span>Alto Contraste</span></div>
        <div class="filtro-item filtro-suave"><span>Suave</span></div>
      </div>

      <div class="slider-duplo">
        <div class="slider-grupo-inline">
          <label class="slider-label">Brilho</label>
          <input type="range" class="slider slider-amarelo">
        </div>
        <div class="slider-grupo-inline">
          <label class="slider-label">Contraste</label>
          <input type="range" class="slider slider-amarelo">
        </div>
      </div>
    </div>

    <div class="cartao">
      <p class="secao-titulo">Funções Especializadas</p>
      <div class="funcao-item">
        <span class="funcao-texto">Ativar IA</span>
        <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="funcao-item">
        <span class="checkbox-quadrado"></span>
        <span class="funcao-texto">Gerar PDF</span>
      </div>
      <div class="funcao-item funcao-com-botao">
        <div class="funcao-esquerda">
          <span class="bolinha-amarela"></span>
          <span class="funcao-texto">Resumir com IA</span>
        </div>
        <button class="btn-criar">Criar Modo</button>
      </div>
    </div>
  </div>

  <footer class="navegacao-sistema">
    <img src="../img/menu-hamburguer.png" alt="Menu" class="icone-nav">
    <img src="../img/circulo.png" alt="Home" class="icone-nav">
    <div class="icone-nav"> < </div>
  </footer>

</div>
</body>
</html>
