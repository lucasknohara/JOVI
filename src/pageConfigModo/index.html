<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar Novo Modo - Câmera</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="phone">

  <div class="top-bar">
    <span class="btn-fechar">&#10005;</span>
    <h2>Configurar Novo Modo</h2>
    <button class="btn-salvar">Salvar</button>
  </div>

  <div class="conteudo">

    <div class="cartao">
      <label class="campo-label">Nome do modo</label>
      <input class="campo-input" type="text" placeholder="Rapidez para estudo">
    </div>

    <div class="cartao">
      <p class="campo-label">Icons</p>
      <div class="icones-wrapper">
        <span class="seta-nav">&#8592;</span>
        <div class="icones-lista">

          <div class="icone-item">
            <div class="icone-circulo">
              <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
          </div>

          <div class="icone-item">
            <div class="icone-circulo">
              <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
          </div>

          <div class="icone-item">
            <div class="icone-circulo">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
          </div>

          <div class="icone-item">
            <div class="icone-circulo">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
          </div>

          <div class="icone-item ativo">
            <div class="icone-circulo">
              <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </div>
          </div>

        </div>
        <span class="seta-nav">&#8594;</span>
      </div>
    </div>

    <div class="cartao">
      <p class="secao-titulo">Ajustes Visuais</p>

      <div class="slider-grupo">
        <label class="slider-label">Zoom</label>
        <input type="range" class="slider slider-branco" min="0" max="100" value="30">
        <div class="slider-marcas">
          <span>0.5x</span>
          <span>2x</span>
          <span>10x</span>
        </div>
      </div>

      <div class="filtros-grade">
        <div class="filtro-item filtro-natural">
          <svg viewBox="0 0 24 24"><path d="M3 17l4-8 4 8"/><path d="M7 9l5 8"/><path d="M17 8a4 4 0 0 1 0 8"/></svg>
          <span>Natural</span>
        </div>
        <div class="filtro-item filtro-alto-contraste ativo">
          <svg viewBox="0 0 24 24"><path d="M3 17l4-8 4 8"/><path d="M7 9l5 8"/><circle cx="17" cy="9" r="2"/></svg>
          <span>Alto Contraste</span>
        </div>
        <div class="filtro-item filtro-suave">
          <svg viewBox="0 0 24 24"><path d="M3 17l4-8 4 8"/><path d="M7 9l5 8"/></svg>
          <span>Suave</span>
        </div>
      </div>

      <div class="slider-duplo">
        <div class="slider-grupo-inline">
          <label class="slider-label">Brilho</label>
          <input type="range" class="slider slider-amarelo" min="0" max="100" value="45">
        </div>
        <div class="slider-grupo-inline">
          <label class="slider-label">Contraste</label>
          <input type="range" class="slider slider-amarelo" min="0" max="100" value="55">
        </div>
      </div>
    </div>

    <div class="cartao">
      <p class="secao-titulo">Funções Especializadas</p>

      <div class="funcao-item">
        <span class="funcao-texto">Ativar IA</span>
        <label class="toggle">
          <input type="checkbox" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="funcao-item">
        <span class="checkbox-quadrado"></span>
        <span class="funcao-texto">Gerar PDF</span>
      </div>

      <div class="funcao-item funcao-com-botao">
        <div class="funcao-esquerda">
          <span class="bolinha-amarela"></span>
          <span class="funcao-texto">Resumir com IA</span>
        </div>
        <button class="btn-criar">Criar Modo</button>
      </div>

      <div class="funcao-item">
        <span class="bolinha-amarela"></span>
        <span class="funcao-texto">Organizar em pastas</span>
      </div>
    </div>

  </div>

  <div class="nav-bar">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>

</div>
</body>
</html>
