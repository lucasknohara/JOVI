<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Modos - Câmera</title>
  <link rel="stylesheet" href="../page02/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="phone">

  <div class="top-bar">
    <h2>Meus modos</h2>
    <span class="edit-btn">Editar</span>
  </div>

  <div class="grid-area">
    <div class="modes-grid">

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><text x="12" y="15" text-anchor="middle" font-size="7" stroke="none" fill="#ccc" font-family="sans-serif" font-weight="bold">HD</text></svg>
        </div>
        <span class="mode-label">Alta Resolução</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><path d="M3 8c2-1 4-1.5 6-1s4 2 6 2 4-.5 6-1.5"/><path d="M3 16c2-1 4-1.5 6-1s4 2 6 2 4-.5 6-1.5"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <span class="mode-label">Panorâmica</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        </div>
        <span class="mode-label">Documento em ultra HD</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/><path d="M9 3l3 3-3 3" stroke-width="1.5"/></svg>
        </div>
        <span class="mode-label">Câmera lenta</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l-3 3"/></svg>
        </div>
        <span class="mode-label">Intervalo</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/><circle cx="18" cy="6" r="1" fill="#ccc" stroke="none"/></svg>
        </div>
        <span class="mode-label">Superlua</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9"/></svg>
        </div>
        <span class="mode-label">Astro</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><text x="12" y="16" text-anchor="middle" font-size="8" stroke="none" fill="#ccc" font-family="sans-serif" font-weight="bold">PRO</text></svg>
        </div>
        <span class="mode-label">Profissional</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8l4-4M8 8L4 4M16 16l4 4M8 16l-4 4"/></svg>
        </div>
        <span class="mode-label">Instantâneo</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2v4M8 4c0 4 8 4 8 0M9 8h6l-1 13H10L9 8z"/></svg>
        </div>
        <span class="mode-label">Comida</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        </div>
        <span class="mode-label">Visualização dupla</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8l2-2M8 8l-2-2M16 16l2 2M8 16l-2 2"/><path d="M20 12h2M2 12h2"/></svg>
        </div>
        <span class="mode-label">Foto em Movimento</span>
      </div>

      <div class="mode-item">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="1"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        </div>
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2.5"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
        </div>
        <span class="mode-label">Estudo</span>
      </div>

    </div>
  </div>

  <div class="bottom-tabs">
    <span class="tab">Estudo</span>
    <span class="tab">Noite</span>
    <span class="tab">Foto</span>
    <span class="tab">Vídeo</span>
    <span class="tab">Retrato</span>
    <span class="tab active">Mais</span>
  </div>

  <div class="nav-bar">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>

</div>
</body>
</html>
